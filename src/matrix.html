*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Share Tech Mono',monospace;}
#wrap{position:relative;width:1200px;height:680px;flex-shrink:0;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}
#rain{position:absolute;top:0;left:0;width:1200px;height:680px;pointer-events:none;}
#gc{position:absolute;top:0;left:0;width:1200px;height:680px;}
#hud{position:absolute;top:14px;left:16px;pointer-events:none;z-index:5;}
#hlabel{color:#00ff41;font-size:13px;letter-spacing:3px;text-shadow:0 0 8px #00ff41;}
.hbar{width:180px;height:9px;background:#020d02;border:1px solid #00ff41;margin-top:4px;box-shadow:0 0 8px rgba(0,255,65,.3);}
.hfill{height:100%;background:#00ff41;transition:width .12s;box-shadow:0 0 6px #00ff41;}
#wnum{color:#00ff41;font-size:12px;margin-top:7px;letter-spacing:2px;text-shadow:0 0 6px #00ff41;}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:20;pointer-events:none;opacity:0;}
#overlay.glitch{animation:gl .6s forwards;}
@keyframes gl{
  0%{opacity:0}8%{opacity:1;background:rgba(0,255,65,.06);transform:skewX(-2deg) translateX(-4px)}
  18%{opacity:.7;transform:skewX(2deg) translateX(4px)}30%{opacity:1;transform:translateX(-2px)}
  50%{opacity:.5;transform:skewX(-.5deg)}70%{opacity:.9}90%{opacity:.3}100%{opacity:0;transform:none}
}
#msg{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);color:#00ff41;font-size:18px;letter-spacing:4px;z-index:25;pointer-events:none;opacity:0;text-align:center;text-shadow:0 0 20px #00ff41,0 0 40px #00ff41;white-space:nowrap;}
#msg.show{animation:sm 2.6s forwards;}
@keyframes sm{0%{opacity:0;transform:translate(-50%,-50%) scale(.7) skewX(-5deg)}12%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}88%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.02)}}

/* ── START SCREEN ── */
#startScreen{position:absolute;top:0;left:0;width:100%;height:100%;z-index:30;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}

.startContent{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;}
.stitle{color:#00ff41;font-size:72px;letter-spacing:20px;text-shadow:0 0 30px #00ff41,0 0 60px #00ff41,0 0 120px #00ff41;animation:titlePulse 2s infinite;margin-bottom:0;}

.stitleSub{color:#007a1f;font-size:13px;letter-spacing:8px;margin:6px 0 10px;animation:fadeIn 1s ease forwards;}
.stitleLine{width:400px;height:1px;background:linear-gradient(90deg,transparent,#00ff41,transparent);margin:16px 0;animation:lineGrow 1.2s ease forwards;}
@keyframes lineGrow{from{width:0;opacity:0}to{width:400px;opacity:1}}
.charrow{display:flex;gap:24px;margin:20px 0 18px;}
.cbtn{background:rgba(0,8,0,.8);border:1px solid #005500;color:#007a1f;padding:12px 36px;font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:4px;cursor:pointer;transition:.25s;position:relative;overflow:hidden;}
.cbtn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,255,65,.1),transparent);transition:.4s;}
.cbtn:hover::before{left:100%;}
.cbtn:hover,.cbtn.sel{border-color:#00ff41;color:#00ff41;background:rgba(0,20,0,.9);box-shadow:0 0 15px rgba(0,255,65,.3),inset 0 0 10px rgba(0,255,65,.05);}

.tr{display:flex;justify-content:space-between;margin:7px 0;font-size:13px;}
.tk{color:#00ff41;text-shadow:0 0 6px #00ff41;}.td{color:#005a00;}
.sbtn{background:rgba(0,8,0,.9);border:1px solid #00ff41;color:#00ff41;padding:14px 50px;font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:5px;cursor:pointer;transition:.25s;box-shadow:0 0 15px rgba(0,255,65,.2);position:relative;overflow:hidden;}
.sbtn::after{content:'';position:absolute;top:50%;left:50%;width:0;height:0;background:rgba(0,255,65,.15);border-radius:50%;transform:translate(-50%,-50%);transition:.5s;}
.sbtn:hover::after{width:300px;height:300px;}
.sbtn:hover{background:#00ff41;color:#000;box-shadow:0 0 30px #00ff41,0 0 60px rgba(0,255,65,.4);}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ── GAME OVER ── */
#goScreen{position:absolute;top:0;left:0;width:100%;height:100%;z-index:30;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:center;}
.gotitle{color:#00ff41;font-size:32px;letter-spacing:6px;margin-bottom:20px;text-shadow:0 0 20px #00ff41;}
.gostats{color:#007a1f;font-size:14px;line-height:2.6;text-align:center;margin-bottom:28px;}

/* ── OVERLAYS ── */
#scanline{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px);pointer-events:none;z-index:11;}
#vignette{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.8) 100%);pointer-events:none;z-index:11;}

function initRain(){drops=[];sdrops=[];
  for(let i=0;i<86;i++){drops.push(Math.random()*49|0);sdrops.push(Math.random()*49|0);}
}
function drawRain(){
  rc.fillStyle='rgba(0,0,0,.06)';rc.fillRect(0,0,1200,680);
  const rainCols=['#00ff41','#00ff88','#8844ff','#ff4400','#ff6600'];
  const rc2=rainCols[CW]||'#00ff41';
  const rc3=CW===0?'#afffca':CW===1?'#ccffaa':CW===2?'#bb99ff':CW===3?'#ff8866':'#ffaa44';
  for(let i=0;i<86;i++){
    const bright=i%5===0;
    rc.fillStyle=bright?rc3:rc2;
    rc.font=(bright?'15px':'13px')+' monospace';
    rc.globalAlpha=bright?.9:.5;
    rc.fillText(CHARS[Math.random()*CHARS.length|0],i*14,drops[i]*14);
    if(drops[i]*14>680&&Math.random()>.975)drops[i]=0;else drops[i]++;
  }
  rc.globalAlpha=1;
}
function drawStartRain(){
  sc.fillStyle='rgba(0,0,0,.04)';sc.fillRect(0,0,1200,680);
  for(let i=0;i<86;i++){
    const bright=i%4===0;
    sc.fillStyle=bright?'#afffca':'#00ff41';
    sc.font=(bright?'16px':'14px')+' monospace';
    sc.globalAlpha=bright?.8:.4;
    sc.fillText(CHARS[Math.random()*CHARS.length|0],i*14,sdrops[i]*14);
    if(sdrops[i]*14>680&&Math.random()>.975)sdrops[i]=0;else sdrops[i]++;
  }
  sc.globalAlpha=1;
}

// ── HEART ITEM ────────────────────────────────────────────────
function drawHeart(ctx,x,y,size,col){
  ctx.save();ctx.fillStyle=col||'#ff2255';ctx.shadowColor=col||'#ff2255';ctx.shadowBlur=12;
  ctx.beginPath();
  const s=size;
  ctx.moveTo(x,y+s*.3);
  ctx.bezierCurveTo(x,y,x-s,y,x-s,y+s*.4);
  ctx.bezierCurveTo(x-s,y+s*.8,x,y+s*1.1,x,y+s*1.3);
  ctx.bezierCurveTo(x,y+s*1.1,x+s,y+s*.8,x+s,y+s*.4);
  ctx.bezierCurveTo(x+s,y,x,y,x,y+s*.3);
  ctx.fill();ctx.shadowBlur=0;ctx.restore();
}
function drawSprite(ctx,spr,x,y,flipX,col4,glowCol){
  const rows=spr.length,cols=spr[0].length;
  ctx.save();
  if(flipX){ctx.translate(x+cols*SZ,y);ctx.scale(-1,1);}
  else ctx.translate(x,y);
  // glow pass
  if(glowCol){
    ctx.shadowColor=glowCol;ctx.shadowBlur=12;
    spr.forEach((row,r)=>row.forEach((c,col)=>{
      if(!c)return;
      ctx.fillStyle=glowCol;
      ctx.fillRect(col*SZ,r*SZ,SZ,SZ);
    }));
    ctx.shadowBlur=0;
  }
  spr.forEach((row,r)=>row.forEach((c,col)=>{
    if(!c)return;
    let color=PAL[c];
    if(col4&&c===4)color=col4;
    ctx.fillStyle=color;
    ctx.fillRect(col*SZ,r*SZ,SZ,SZ);
  }));
  ctx.restore();
}

function genFgBlds(from,to){
  const arr=[];let x=from+120;
  while(x<to){
    const s=((x*1234567+99)>>>0);
    const w=80+(s%60);   // wide: 80-140px
    const h=160+(s>>3&120); // tall: 160-280px
    arr.push({wx:x,y:GROUND-h,w,h});
    x+=w+400+(s>>8&200); // big gap: 400-600px between buildings
  }
  return arr;
}

document.addEventListener('keydown',e=>{

  const k=e.key;if(G.keys[k])return;
  G.keys[k]=true;
  const now=Date.now(),p=G.p;
  const recent=(key,ms)=>G.lastKeyTime[key]&&(now-G.lastKeyTime[key])<ms;

  if(k==='ArrowRight'){if(recent('ArrowRight',280)){p.vx=p.isSprinting?18:12;discover('dash');}G.lastKeyTime['ArrowRight']=now;G.dirSeq.push('R');}
  if(k==='ArrowLeft'){if(recent('ArrowLeft',280)){p.vx=p.isSprinting?-18:-12;discover('backdash');}G.lastKeyTime['ArrowLeft']=now;G.dirSeq.push('L');}
  if(k==='ArrowUp'){if(recent('ArrowUp',300)){p.vy=-26;discover('highjump');}G.lastKeyTime['ArrowUp']=now;G.dirSeq.push('U');G.gravSeq.push('U');G.konamiSeq.push(k);chkKonami();chkAwakening();}
  if(k==='ArrowDown'){if(recent('ArrowDown',300)){p.isSliding=true;p.slideTimer=35;p.slideDir=p.facing;discover('slide');}G.lastKeyTime['ArrowDown']=now;G.dirSeq.push('D');G.gravSeq.push('D');G.konamiSeq.push(k);chkGravFlip();chkAwakening();}

  if(k===' '){
    p.spaceHeld=true;G.hackHeld.space=true;
    if(p.onGround){const goDown=G.keys['ArrowDown'];p.vy=goDown?22:-20;p.onGround=false;p.jumps=1;if(goDown)discover('groundslam');}
    else if(p.jumps<2){p.vy=-17;p.jumps++;discover('doublejump');}
    if(recent('ArrowRight',300))discover('longjump');
    G.konamiSeq.push(k);chkHack();chkUltimate();
  }
  if(k==='x'||k==='X'){
    G.hackHeld.x=true;G.xCount++;
    const el=now-(p.lastPunchTime||0);
    p.punchChain=el<500?(p.punchChain||0)+1:1;
    p.lastPunchTime=now;p.punchTimer=18;p.anim='punch';
    if(p.punchChain>=3)discover('triplepunch');
    if(!p.onGround)discover('airpunch');
    if(G.keys['Shift']){spawnRing(p,80,'#ffaa00');discover('powerpunch');}
    if(G.zHeld){spawnRing(p,120,'#00ff41');discover('shockwave');}
    if(G.keys['Shift']&&G.keys[' ']){spawnRing(p,300,'#00ff41');discover('ultimatestrike');}
    if(G.shiftCount>=2&&G.xCount>=2){destroyAll();discover('destroyer');G.shiftCount=0;G.xCount=0;}
    chkUltimate();G.lastKeyTime['x']=now;
  }

  // V = SHOOT GUN
  if(k==='v'||k==='V'){
    if(G.p.ammo>0){
      G.p.ammo--;G.p.gunAnim=14;
      const dir=G.p.facing,spd=16;
      G.pBullets.push({x:G.p.x+(dir>0?G.p.w+4:-14),y:G.p.y+G.p.h*.35,vx:dir*spd,vy:0,life:70,dmg:G.p.isHacked?500:22});
      discover('shoot');
    } else {G.p.ammo=G.p.maxAmmo;discover('reload');}
  }
  if(k==='Shift'){p.isSprinting=true;G.hackHeld.shift=true;G.shiftCount++;discover('sprint');G.lastKeyTime['Shift']=now;}
  if(k==='q'||k==='Q'){
    G.hackHeld.q=true;
    if(recent('q',380)){G.qCount++;if(!p.isBulletTime){p.isBulletTime=true;p.btTimer=220;discover('bullettime');}G.qeqBuf.push('q');chkQEQ();}
    else{G.qCount=1;G.qeqBuf=['q'];}
    G.lastKeyTime['q']=now;G.konamiSeq.push(k);
  }
  if(k==='e'||k==='E'){
    G.hackHeld.e=true;
    if(recent('e',380)){p.isPhasing=true;p.phaseTimer=130;discover('phase');}
    G.lastKeyTime['e']=now;G.qeqBuf.push('e');chkQEQ();

  if(k==='ArrowLeft'){G.leftRapid=(G.leftRapid||0)+1;if(recent('leftR',250)&&G.leftRapid>=5){p.vx=-30;p.invincible=true;p.invTimer=30;discover('sonicback');G.leftRapid=0;}G.lastKeyTime['leftR']=now;}

  // Hold Shift + press SPACE + X + Q simultaneously = ULTIMATE FORM
  if(G.hackHeld.shift&&G.hackHeld.space&&G.hackHeld.q&&(G.keys['x']||G.keys['X'])&&!G.p.isHacked){

  }
  // N E O → spell NEO

  if((k==='o'||k==='O')&&G.lastKeyTime['ne']&&(now-G.lastKeyTime['ne'])<500){discover('spellneo');spawnRing(p,200,'#00ff41');}
  // Z I O N → spell ZION
  if(k==='z'||k==='Z'){G.lastKeyTime['z2']=now;}
  if((k==='i'||k==='I')&&recent('z2',500)){G.lastKeyTime['zi']=now;}
  if((k==='o'||k==='O')&&G.lastKeyTime['zi']&&(now-G.lastKeyTime['zi'])<500){G.lastKeyTime['zio']=now;}

  // Hold SPACE 3s on ground = meditate
  if(k===' '&&p.onGround){G.meditateStart=now;}
  // U U U = ultra
  if(k==='u'||k==='U'){if(recent('u',400)){G.uCount=(G.uCount||0)+1;if(G.uCount>=3){spawnRing(p,240,'#ffff00');discover('ultra');G.uCount=0;}}else G.uCount=1;G.lastKeyTime['u']=now;}

  if(k==='k'||k==='K'){if(recent('k',350)){p.vy=-8;p.vx=p.facing*14;discover('flyingkick');}G.lastKeyTime['k']=now;}

  if(k==='l'||k==='L'){if(recent('l',400)){G.lCount=(G.lCount||0)+1;if(G.lCount>=3){p.isBulletTime=true;p.btTimer=300;discover('matrixwalk');G.lCount=0;}}else G.lCount=1;G.lastKeyTime['l']=now;}

  if(k==='p'||k==='P'){if(recent('p',380)){p.invincible=true;p.invTimer=150;spawnRing(p,100,'#ffdd00');discover('powerstance');}G.lastKeyTime['p']=now;}
  // J = jump then X quickly in air = dropkick
  if(k==='j'||k==='J'){if(!p.onGround){p.vy=6;p.vx=p.facing*10;p.punchTimer=20;discover('dropkick');}G.lastKeyTime['j']=now;}
  // hold ArrowUp 60 frames = levitate (checked via update)

  if(k===' '&&G.keys['ArrowLeft']&&G.keys['ArrowRight']){spawnRing(p,160,'#00ff41');discover('spinatk');}
  // Q + W + E all at same time
  if((k==='q'||k==='Q')&&G.keys['w']&&G.keys['e']){p.isBulletTime=true;p.btTimer=400;discover('qwe');}
  if((k==='w'||k==='W')&&G.keys['q']&&G.keys['e']){p.isBulletTime=true;p.btTimer=400;discover('qwe');}
  // SPACE SPACE SPACE fast = triple bounce
  if(k===' '){G.spaceRapid=(G.spaceRapid||0)+1;if(recent('spaceR',300)&&G.spaceRapid>=3){p.vy=-22;discover('triplespace');G.spaceRapid=0;}G.lastKeyTime['spaceR']=now;}
  // ArrowDown in air = ground pound
  if(k==='ArrowDown'&&!p.onGround){p.vy=18;discover('groundpound');spawnRing(p,80,'#ff8800');}
  // X then immediately ArrowRight = dash punch
  if(k==='ArrowRight'&&recent('x',200)){p.vx=14;p.punchTimer=20;discover('dashpunch');}
  // Shift+ArrowDown = power slide
  if(k==='ArrowDown'&&G.keys['Shift']){p.isSliding=true;p.slideTimer=60;p.slideDir=p.facing;discover('powerslide');}

  if(k==='x'||k==='X'){if(recent('xflurry',250)){G.xFlurry=(G.xFlurry||0)+1;if(G.xFlurry>=5){spawnRing(p,120,'#ff8800');discover('flurry');G.xFlurry=0;}}else G.xFlurry=1;G.lastKeyTime['xflurry']=now;}
  // SPACE while pressing both arrows = air dash
  if(k===' '&&G.keys['ArrowLeft']&&G.keys['ArrowRight']){discover('airdash');}
  G.konamiSeq.push(k);if(G.konamiSeq.length>12)G.konamiSeq.shift();chkKonami();
},{passive:false});

function chkAwakening(){const l=G.dirSeq.slice(-4).join('');if(l==='UDLR'||l==='UDRL'){discover('awakening');G.p.isBulletTime=true;G.p.btTimer=1800;G.p.invincible=true;G.p.invTimer=1800;G.dirSeq=[];}}
function chkGravFlip(){if(G.gravSeq.slice(-6).join('')==='UDUDUD'){discover('gravityflip');G.p.vy=-40;G.gravSeq=[];}}
function teleportBehind(){const en=G.enemies[0];if(en){G.p.x=Math.max(10,Math.min(GW-70,en.x+(en.x>G.p.x?-70:70)));}}
function spawnRing(p,r,col){
  for(let j=0;j<3;j++)G.particles.push({type:'ring',x:p.x+p.w/2,y:p.y+p.h/2,r:j*r*.15,maxR:r,life:30,maxLife:30,col,width:3-j*.5});
  G.enemies.forEach(en=>{const dx=en.x-p.x,dy=en.y-p.y;if(Math.sqrt(dx*dx+dy*dy)<r){en.vx=dx>0?12:-12;en.vy=-9;en.health-=G.p.isHacked?9999:42;}});
}
function destroyAll(){
  G.enemies.forEach(en=>{en.health=0;for(let i=0;i<8;i++)spawnExplosion(en.x+en.w/2,en.y+en.h/2);});
  G.bullets=[];G.screenShake=25;
  G.particles.push({type:'ring',x:GW/2,y:GH/2,r:0,maxR:800,life:35,maxLife:35,col:'#00ff41',width:4});
}
function spawnExplosion(x,y){
  for(let i=0;i<12;i++){
    const a=i/12*Math.PI*2;const spd=3+Math.random()*5;
    G.particles.push({type:'shard',x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:35,maxLife:35,col:Math.random()>.5?'#00ff41':'#ffaa00',size:3+Math.random()*5});

function spawnEnemy(){
  const wave=G.wave;
  // easy->hard: max enemies grows slowly
  const maxE=wave<=3?1:wave<=7?2:wave<=12?3:Math.min(3+Math.floor((wave-12)/2),10);
  if(G.enemies.length>=maxE)return;
  const side=Math.random()>.5,x=side?GW-80:-10;
  const keys=Object.keys(AGENT_DATA);
  let tk;
  // early waves: only smith, slow, no shooting
  if(wave<=2)tk='smith';
  else if(wave<=5)tk=Math.random()<.7?'smith':'teacher';
  else{const pool=keys.slice(0,Math.min(1+Math.floor((wave-4)/3),keys.length));tk=pool[Math.random()*pool.length|0];}
  const D=AGENT_DATA[tk];
  // speed and hp scale gently at first
  const waveScale=wave<=4?.4:wave<=7?.6:wave<=10?.8:1;
  const spd=(1.2+wave*.06)*waveScale*(G.p.isBulletTime?.28:1);
  const hp=(12+wave*2)*D.hp*waveScale;
  // early waves: longer shoot timer (agents hesitate)
  const shootDelay=wave<=2?999:wave<=5?999:wave<=8?(120+Math.random()*80)/D.sr:(70+Math.random()*60)/D.sr;
  G.enemies.push({x,y:GROUND-90,w:55,h:90,vx:(side?-1:1)*spd*D.spd,vy:0,onGround:false,
    health:hp,maxHealth:hp,name:D.name,agentCol:D.col,bc:D.bc,sr:D.sr,tint:D.tint,style:D.style,
    facing:side?1:-1,anim:'idle',animFrame:0,animTick:0,shootTimer:shootDelay,
    isShooting:false,shootAnim:0,stealthT:0,stealthA:1,dead:false});
}

function checkWorld(){
  const nw=Math.min(Math.floor(G.kills/20),WORLDS.length-1);
  if(nw===CW)return;
  CW=nw;
  const W=WORLDS[CW];
  const wl=document.getElementById('worldLabel');
  wl.textContent=W.n;wl.style.color=WCOLS[CW];
  wl.style.textShadow='0 0 20px '+WCOLS[CW];
  G.screenShake=28;
  G.particles.push({type:'ring',x:GW/2,y:GH/2,r:0,maxR:1400,life:50,maxLife:50,col:WCOLS[CW],width:6});
  G.particles.push({type:'ring',x:GW/2,y:GH/2,r:0,maxR:700,life:38,maxLife:38,col:WCOLS[CW],width:3});
  const el=document.getElementById('msg');el.className='';el.textContent='[ '+W.n+' ]';void el.offsetWidth;el.className='show';
}

function updateHearts(){
  if(!G.hearts)return;
  G.hearts.forEach(h=>{
    h.vy+=.5;h.y+=h.vy;h.anim=(h.anim||0)+1;h.life--;
    if(h.y+20>GROUND){h.y=GROUND-20;h.vy=0;}
    // collect
    const sx=h.wx-G.camX;
    if(Math.abs(sx-G.p.x)<50&&Math.abs(h.y-G.p.y)<60){
      if(G.p.hearts<G.p.maxHearts){G.p.hearts++;G.p.heartFlash=40;}
      h.life=0;
      G.particles.push({type:'ring',x:sx,y:h.y,r:0,maxR:60,life:20,maxLife:20,col:'#ff2255',width:2});
    }
  });
  G.hearts=G.hearts.filter(h=>h.life>0);
}

function updateCivilians(){
  if(!G.civilians)return;
  G.civilians.forEach(cv=>{
    cv.vy+=.6;cv.y+=cv.vy;
    cv.sx=cv.wx-G.camX; // screen x
    if(cv.y+cv.h>=GROUND){cv.y=GROUND-cv.h;cv.vy=0;}
    cv.animTick++;
    if(cv.animTick%12===0)cv.animFrame=(cv.animFrame+1)%2;
    if(!cv.transformed){
      cv.wx+=cv.vx;cv.facing=cv.vx>0?1:-1;
      // bounce at screen edges
      if(cv.sx<30||cv.sx>GW-60)cv.vx*=-1;
      // check distance to player
      const dist=Math.abs(cv.sx-G.p.x);
      if(dist<180){
        // freeze and slowly transform
        cv.vx=0; // freeze in place
        cv.transformTimer=(cv.transformTimer||0)+1;
        if(cv.transformTimer>90){
          cv.transformed=true;
          // become an agent!
          const keys=Object.keys(AGENT_DATA);
          const tk=keys[Math.floor(Math.random()*Math.min(3,keys.length))];
          const D=AGENT_DATA[tk];
          G.enemies.push({
            x:cv.sx,y:cv.y,w:55,h:90,
            vx:(cv.sx>G.p.x?-1:1)*2.5,vy:-6,onGround:false,
            health:(25+G.wave*4)*D.hp,maxHealth:(25+G.wave*4)*D.hp,
            name:D.name,agentCol:D.col,bc:D.bc,sr:D.sr,tint:D.tint,style:D.style,
            facing:cv.facing,anim:'idle',animFrame:0,animTick:0,
            shootTimer:40,isShooting:false,shootAnim:0,stealthT:0,stealthA:1,dead:false
          });
          G.screenShake=8;
          // glitch effect
          G.particles.push({type:'ring',x:cv.sx,y:cv.y+cv.h/2,r:0,maxR:80,life:18,maxLife:18,col:'#00ff41',width:3});
          cv.life=0; // remove civilian
        }
      } else {
        cv.transformTimer=0;
      }
    }
  });
  G.civilians=G.civilians.filter(cv=>cv.life===undefined||cv.life>0);
  // scroll civilians with camera
  // (their wx is world-based, sx computed each frame)
  // cull far away
  G.civilians=G.civilians.filter(cv=>(cv.wx-G.camX)>-300&&(cv.wx-G.camX)<GW+400);
  // spawn more if few ahead
  const aheadCivs=G.civilians.filter(cv=>cv.wx>G.camX+GW*.5).length;
  if(aheadCivs<2&&Math.random()<.01)spawnCivilians();
}
function updatePlayer(){
  const p=G.p,bt=p.isBulletTime?.35:1,spd=(p.isSprinting?7:5)*(p.isFlying?1.3:1);
  if(!p.isSliding){if(G.keys['ArrowRight']){p.vx=spd;p.facing=1;}else if(G.keys['ArrowLeft']){p.vx=-spd;p.facing=-1;}else p.vx*=.82;}
  else{p.vx=p.slideDir*9;}
  if(p.spaceHeld&&!p.onGround){p.spaceHoldTime=(p.spaceHoldTime||0)+1;if(p.spaceHoldTime>45&&!p.isFlying){p.isFlying=true;p.flyTimer=0;discover('fly');}if(p.isFlying){p.vy=-4*bt;p.flyTimer++;if(p.flyTimer>320){p.infiniteFly=true;discover('inffly');}}}
  else{p.spaceHoldTime=0;if(!p.infiniteFly)p.isFlying=false;}
  if(p.infiniteFly&&p.spaceHeld)p.vy=-3.5;
  if(!p.isFlying&&!p.infiniteFly)p.vy+=.78*bt;
  p.x+=p.vx*bt;p.y+=p.vy*bt;
  if(p.y+p.h>=GROUND){p.y=GROUND-p.h;p.vy=0;p.onGround=true;p.jumps=0;p.isFlying=false;if(!p.spaceHeld)p.infiniteFly=false;}else p.onGround=false;
  G.platforms.forEach(pl=>{if(p.vy>=0&&p.x+p.w>pl.x&&p.x<pl.x+pl.w&&p.y+p.h>pl.y&&p.y+p.h<pl.y+pl.h+16){p.y=pl.y-p.h;p.vy=0;p.onGround=true;p.jumps=0;}});
  // ── FOREGROUND BUILDING COLLISION (player only, not enemies) ──
  if(G.fgBlds){
    G.fgBlds.forEach(b=>{
      const bsx=b.wx-G.camX;
      // left/right wall collision
      if(p.y+p.h>b.y&&p.y<GROUND){
        // right wall of building
        if(p.x+p.w>bsx&&p.x+p.w<bsx+20&&p.vx>0){p.x=bsx-p.w;p.vx=0;}
        // left wall
        if(p.x<bsx+b.w&&p.x>bsx+b.w-20&&p.vx<0){p.x=bsx+b.w;p.vx=0;}
      }
      // top of building = landing surface
      if(p.vy>=0&&p.x+p.w>bsx+4&&p.x<bsx+b.w-4&&p.y+p.h>b.y&&p.y+p.h<b.y+20){
        p.y=b.y-p.h;p.vy=0;p.onGround=true;p.jumps=0;
      }
    });
  }


  // infinite scroll
  if(p.x>GW*0.6){
    const push=p.x-GW*0.6;G.camX+=push;p.x=GW*0.6;
    G.enemies.forEach(en=>en.x-=push);G.platforms.forEach(pl=>pl.x-=push);
    G.bullets.forEach(b=>b.x-=push);G.particles.forEach(pt=>{if(pt.x!==undefined)pt.x-=push;});
    G.platforms=G.platforms.filter(pl=>pl.x+pl.w>-200);
    const rightmost=G.platforms.reduce((m,pl)=>Math.max(m,pl.x+pl.w),-999);
    if(rightmost<GW+100)G.platforms.push({x:rightmost+160+Math.random()*100|0,y:GROUND-130-Math.random()*140|0,w:110+Math.random()*80|0,h:14});
  }
  if(p.x<GW*0.2&&G.camX>0){const push=GW*0.2-p.x;G.camX=Math.max(0,G.camX-push);p.x=Math.max(GW*0.2,p.x);G.enemies.forEach(en=>en.x+=push);G.platforms.forEach(pl=>pl.x+=push);G.bullets.forEach(b=>b.x+=push);}

  if(p.punchTimer>0)p.punchTimer--;if(p.slideTimer>0)p.slideTimer--;else p.isSliding=false;
  if(p.phaseTimer>0)p.phaseTimer--;else p.isPhasing=false;if(p.invisTimer>0)p.invisTimer--;else p.isInvisible=false;
  if(p.cvTimer>0)p.cvTimer--;else p.codeVision=false;if(p.invTimer>0)p.invTimer--;else{if(!p.isHacked)p.invincible=false;}
  if(p.btTimer>0)p.btTimer--;else{if(!p.isHacked)p.isBulletTime=false;}
  p.animTick++;
  if(p.punchTimer>0)p.anim='punch';else if(p.isFlying||p.infiniteFly)p.anim='fly';
  else if(!p.onGround)p.anim='jump';else if(Math.abs(p.vx)>0.5)p.anim='run';else p.anim='idle';
  if(p.animTick%7===0)p.animFrame=(p.animFrame+1)%2;
  if(!p.invincible&&!p.isPhasing&&!p.isInvisible&&!p.isHacked)G.enemies.forEach(en=>{if(Math.abs(p.x-en.x)<50&&Math.abs(p.y-en.y)<60)p.health-=.22;});
  // passive: hold SPACE on ground 3s = meditate heal
  if(p.spaceHeld&&p.onGround&&G.meditateStart&&(Date.now()-G.meditateStart)>2000){p.health=Math.min(p.maxHealth,p.health+.05);discover('meditate');}
  // passive: hold UP in air = levitate
  if(G.keys['ArrowUp']&&!p.onGround){G.levitateT=(G.levitateT||0)+1;if(G.levitateT>50){p.vy=Math.min(p.vy,0);discover('levitate');}}else{G.levitateT=0;}
}

function updateEnemies(){
  const bt=G.p.isBulletTime?.28:1;
  G.enemies.forEach(en=>{
    en.vy+=.78*bt;en.x+=en.vx*bt;en.y+=en.vy*bt;
    if(en.y+en.h>=GROUND){en.y=GROUND-en.h;en.vy=0;en.onGround=true;}
    G.platforms.forEach(pl=>{if(en.vy>=0&&en.x+en.w>pl.x&&en.x<pl.x+pl.w&&en.y+en.h>pl.y&&en.y+en.h<pl.y+pl.h+12){en.y=pl.y-en.h;en.vy=0;en.onGround=true;}});
    en.vx*=.9;const dx=G.p.x-en.x;if(Math.abs(dx)>50)en.vx+=(dx>0?1:-1)*.22;
    en.facing=dx>0?1:-1;en.shootTimer-=bt;
    if(en.shootTimer<=0){
      en.isShooting=true;en.shootAnim=18;
      const sdx=G.p.x-en.x,sdy=G.p.y-en.y,sd=Math.sqrt(sdx*sdx+sdy*sdy)||1;
      const spd=(5+G.wave*.12);
      const col=en.agentCol||'#ffee44';
      const sty=en.style||'gun';
      if(sty==='snipe'){
        G.bullets.push({x:en.x+en.w/2,y:en.y+en.h*.4,vx:sdx/sd*spd*3,vy:sdy/sd*spd*3,life:200,col,r:6});
      } else if(sty==='bomb'){
        for(let a=0;a<8;a++){const ang=a/8*Math.PI*2;G.bullets.push({x:en.x+en.w/2,y:en.y+en.h*.5,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:140,col,r:5});}
      } else if(sty==='boss'){
        for(let a=0;a<10;a++){const ang=a/10*Math.PI*2;G.bullets.push({x:en.x+en.w/2,y:en.y+en.h*.5,vx:Math.cos(ang)*spd*.9,vy:Math.sin(ang)*spd*.9,life:160,col:'#ff2200',r:6});}
        G.bullets.push({x:en.x+en.w/2,y:en.y+en.h*.4,vx:sdx/sd*spd*2.5,vy:sdy/sd*spd*2.5,life:200,col:'#ff8800',r:7});
      } else if(sty==='spread'){
        const bc=en.bc||3;
        for(let bi=0;bi<bc;bi++){const sp=(bi-(bc-1)/2)*.25;const bvx=sdx/sd*spd*Math.cos(sp)-sdy/sd*spd*Math.sin(sp);const bvy=sdx/sd*spd*Math.sin(sp)+sdy/sd*spd*Math.cos(sp);G.bullets.push({x:en.x+en.w/2,y:en.y+en.h*.4,vx:bvx,vy:bvy,life:160,col,r:5});}
      } else {
        // gun / rush / stealth — direct shot
        G.bullets.push({x:en.x+en.w/2,y:en.y+en.h*.4,vx:sdx/sd*spd,vy:sdy/sd*spd,life:160,col,r:5});
        if((en.bc||1)>=2) G.bullets.push({x:en.x+en.w/2,y:en.y+en.h*.4,vx:sdx/sd*spd*1.1,vy:sdy/sd*spd*1.1+1,life:160,col,r:5});
      }
      en.shootTimer=Math.max(14,(70-G.wave*.8)/(en.sr||1));
    }
    if(en.shootAnim>0)en.shootAnim--;else en.isShooting=false;
    en.animTick=(en.animTick||0)+1;en.anim=en.isShooting?'shoot':(Math.abs(en.vx)>.5?'walk':'idle');en.animFrame=Math.floor(en.animTick/7)%2;
    en.x=Math.max(-200,Math.min(GW+200,en.x));
    // fight styles
    if(en.style==='rush'){const dx=G.p.x-en.x;en.vx+=(dx>0?1:-1)*.5;}
    if(en.style==='stealth'){en.stealthT=(en.stealthT||0)+1;en.stealthA=en.stealthT%140<70?.12:1;}
  });
  // count kills when enemy dies
  G.enemies.forEach(en=>{if(en.health<=0&&!en.dead){en.dead=true;G.kills++;if(G.kills%8===0&&G.p.hearts<G.p.maxHearts){G.p.hearts++;G.p.heartFlash=60;}spawnExplosion(en.x+en.w/2,en.y+en.h/2);checkWorld();}});
  G.enemies=G.enemies.filter(en=>en.health>0);
}

function updateBullets(){
  const bt=G.p.isBulletTime?.22:1;
  G.bullets.forEach(b=>{
    b.x+=b.vx*bt;b.y+=b.vy*bt;b.life--;
    if(!G.p.invincible&&!G.p.isPhasing&&!G.p.isInvisible&&!G.p.isHacked){
      if(b.x>G.p.x&&b.x<G.p.x+G.p.w&&b.y>G.p.y&&b.y<G.p.y+G.p.h){
        if(!G.p.invincible&&!G.p.isHacked){G.p.bulletHits=(G.p.bulletHits||0)+1;if(G.p.bulletHits>=2){G.p.hearts=Math.max(0,G.p.hearts-1);G.p.heartFlash=60;G.screenShake=10;G.p.bulletHits=0;}}b.life=0;spawnExplosion(b.x,b.y);
      }
    }
  });
  G.bullets=G.bullets.filter(b=>b.life>0&&b.x>-100&&b.x<GW+100&&b.y>-100&&b.y<GH+100);
  // player bullets
  if(G.pBullets){
    G.pBullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;
      G.enemies.forEach(en=>{if(b.life>0&&b.x>en.x&&b.x<en.x+en.w&&b.y>en.y&&b.y<en.y+en.h){en.health-=b.dmg||22;b.life=0;G.screenShake=2;}});
    });
    G.pBullets=G.pBullets.filter(b=>b.life>0&&b.x>-50&&b.x<GW+100);
  }
}

function updatePunchHit(){
  if(!G.p.punchTimer)return;
  const p=G.p,px=p.facing>0?p.x+p.w:p.x-50,py=p.y+10;
  G.enemies.forEach(en=>{
    if(px+50>en.x&&px<en.x+en.w&&py+30>en.y&&py<en.y+en.h){
      const dmg=p.isHacked?9999:G.keys['Shift']?42:16;
      en.health-=dmg;en.vx=p.facing*8;en.vy=-7;G.screenShake=5;
      spawnExplosion(en.x+en.w/2,en.y+en.h/2);
    }
  });
}

function updateBoss(){
  if(!G.boss)return;
  const b=G.boss,p=G.p,bt=G.p.isBulletTime?.3:1;
  // boss floats and chases
  b.vy+=.4*bt;
  b.x+=b.vx*bt;b.y+=b.vy*bt;
  if(b.y+b.h>=GROUND){b.y=GROUND-b.h;b.vy=0;}
  if(b.x<50){b.x=50;b.vx=Math.abs(b.vx);}
  if(b.x+b.w>GW-50){b.x=GW-b.w-50;b.vx=-Math.abs(b.vx);}
  const dx=p.x-b.x;b.vx+=(dx>0?1:-1)*.08*bt;b.vx=Math.max(-4,Math.min(4,b.vx));
  // phase transitions
  const hp=b.health/b.maxHealth;
  if(hp<0.5&&b.phase===1){b.phase=2;b.vx*=1.5;G.screenShake=20;const el=document.getElementById('msg');el.className='';el.textContent='PHASE 2: RAGE';void el.offsetWidth;el.className='show';}
  if(hp<0.15&&b.phase===2){b.phase=3;G.screenShake=30;const el=document.getElementById('msg');el.className='';el.textContent='PHASE 3: FINAL FORM';void el.offsetWidth;el.className='show';}
  // boss shoots based on phase
  b.shootTimer-=bt;
  if(b.shootTimer<=0){
    const sdx=p.x-b.x,sdy=p.y-b.y,sd=Math.sqrt(sdx*sdx+sdy*sdy)||1;
    const spd=b.phase===3?9:b.phase===2?7:5;
    const numShots=b.phase===3?16:b.phase===2?10:6;
    for(let a=0;a<numShots;a++){
      const ang=a/numShots*Math.PI*2+(Date.now()*.001);
      G.bullets.push({x:b.x+b.w/2,y:b.y+b.h/2,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:200,col:'#ff0000',r:7});
    }
    // aimed shot always
    G.bullets.push({x:b.x+b.w/2,y:b.y+b.h/2,vx:sdx/sd*spd*1.5,vy:sdy/sd*spd*1.5,life:200,col:'#ff8800',r:9});
    b.shootTimer=b.phase===3?15:b.phase===2?22:35;
  }
  // boss touch damage
  if(!p.invincible&&!p.isPhasing&&!p.isHacked){
    if(Math.abs(p.x-b.x)<b.w&&Math.abs(p.y-b.y)<b.h){p.bossDmg=(p.bossDmg||0)+1;if(p.bossDmg>30){p.hearts=Math.max(0,p.hearts-1);p.bossDmg=0;p.heartFlash=60;G.screenShake=12;}}
  }
  // boss takes damage from player bullets
  if(G.pBullets){
    G.pBullets.forEach(pb=>{
      if(pb.life>0&&pb.x>b.x&&pb.x<b.x+b.w&&pb.y>b.y&&pb.y<b.y+b.h){
        // damage scales with discovered powers
        const powerBonus=Math.floor(G.totalPowers/5);
        const dmg=p.isHacked?9999:p.rageTimer>0?60+powerBonus*10:p.isBulletTime?10+powerBonus:3+powerBonus;
        b.health-=dmg;pb.life=0;G.screenShake=3;
        spawnExplosion(pb.x,pb.y);
      }
    });
  }
  // punch barely hurts boss
  if(p.punchTimer>0){
    if(Math.abs(p.x-b.x)<b.w+60&&Math.abs(p.y-b.y)<b.h){
      const dmg=p.isHacked?500:p.rageTimer>0?100:G.keys['shift']?15:3;
      b.health-=dmg;G.screenShake=4;spawnExplosion(b.x+b.w/2,b.y+b.h/2);
    }
  }
  // rings/shockwaves hurt boss a lot
  G.particles.forEach(pt=>{
    if(pt.type==='ring'&&pt.r>0){
      if(Math.sqrt((pt.x-b.x-b.w/2)**2+(pt.y-b.y-b.h/2)**2)<pt.r+b.w/2){
        b.health-=80;
      }
    }
  });
  b.health=Math.max(0,b.health);
  if(b.health<=0){
    G.boss=null;G.bossActive=false;
    spawnExplosion(b.x+b.w/2,b.y+b.h/2);
    spawnExplosion(b.x+b.w/2,b.y+b.h/4);
    spawnExplosion(b.x,b.y+b.h/2);
    G.particles.push({type:'ring',x:GW/2,y:GH/2,r:0,maxR:2000,life:80,maxLife:80,col:'#ffdd00',width:10});
    G.screenShake=50;
    const el=document.getElementById('msg');el.className='';el.textContent='YOU ARE THE ONE';void el.offsetWidth;el.className='show';
    G.kills+=50;checkWorld();
    // WIN — show victory after delay
    setTimeout(()=>{
      G.running=false;
      const go=document.getElementById('goScreen');go.style.display='flex';
      const isNR=saveRecord(G.kills,G.wave,WORLDS[CW].n);
      document.getElementById('goStats').innerHTML='<span style="color:#ffdd00;font-size:18px;text-shadow:0 0 20px #ffdd00">★ YOU DEFEATED THE SOURCE ★</span><br><br>KILLS: '+G.kills+'<br>WORLD: '+WORLDS[CW].n+'<br>POWERS DISCOVERED: '+G.totalPowers;
      document.querySelector('.gotitle').textContent='YOU ARE THE ONE';
      showRecord();
    },3000);
  }
}

function updateParticles(){
  if(G.p.comboChain>0&&Date.now()-(G.p.lastHitTime||0)>1800)G.p.comboChain=0;
  G.particles.forEach(pt=>{
    pt.life--;
    if(pt.type==='ring')pt.r+=(pt.maxR-pt.r)*.32;
    if(pt.type==='shard'){pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=.3;pt.vx*=.96;}
  });
  G.particles=G.particles.filter(p=>p.life>0);
  if(G.p.comboChain>0&&Date.now()-(G.p.lastHitTime||0)>2000)G.p.comboChain=0;
}


function spawnHeart(x,y){
  G.hearts.push({wx:x,y:y||GROUND-30,vy:0,life:600,anim:0});
}
function spawnCivilians(){
  if(!G.civilians)G.civilians=[];
  // spawn 2-3 civilians ahead of player
  const ahead=G.camX+GW+100;
  for(let i=0;i<3;i++){
    const wx=ahead+100+i*180+Math.random()*120;
    G.civilians.push({wx,y:GROUND-90,w:27,h:90,vx:(Math.random()>.5?1:-1)*.8,vy:0,
      animTick:0,animFrame:0,facing:1,transformed:false,transformTimer:0,
      // each civ has a random "disguise" color
      hair:Math.floor(Math.random()*3), // 0=dark 1=brown 2=blonde
    });
  }
}
function checkWave(){
  // spawn final boss in last world
  if(CW===4&&!G.bossSpawned&&G.kills>=80){
    spawnFinalBoss();
    G.bossSpawned=true;
    const el=document.getElementById('msg');el.className='';el.textContent='THE SOURCE AWAKENS';void el.offsetWidth;el.className='show';
    G.screenShake=40;
    G.particles.push({type:'ring',x:GW/2,y:GH/2,r:0,maxR:1600,life:60,maxLife:60,col:'#ff0000',width:8});
    return;
  }
  if(G.bossActive)return; // stop normal spawning during boss fight
  G.spawnTimer-=(G.p.isBulletTime?.28:1);
  if(G.spawnTimer<=0){spawnEnemy();G.spawnTimer=G.wave<=3?280:G.wave<=7?180:G.wave<=12?120:Math.max(12,80-G.wave*1.8);}
  if(G.enemies.length===0&&G.kills>0&&G.kills%Math.max(3,6-Math.floor(G.wave/14))===0){G.wave++;G.screenShake=10;spawnCivilians();const el=document.getElementById("msg");el.className="";el.textContent="WAVE "+G.wave;void el.offsetWidth;el.className="show";}
}

function spawnFinalBoss(){
  G.bossActive=true;
  G.enemies=[];G.bullets=[];
  // boss has massive hp — only powers can dent him
  const bossHp=5000;
  G.boss={
    x:GW*0.7,y:GROUND-160,w:110,h:160,
    vx:-1.5,vy:0,onGround:false,
    health:bossHp,maxHealth:bossHp,
    phase:1, // 1=normal 2=rage 3=final
    shootTimer:30,
    animTick:0,anim:'idle',
    name:'THE SOURCE',
    powerDmgMult:1, // normal attacks do 1hp, powers do more
  };
}

// ── DRAW ──────────────────────────────────────────────────────────
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');

// Pre-built city data (stable per-column)
function getBld(ix){const s=((ix*2654435761+13)>>>0);return{h:120+(s%200),w:55+(s>>5&63),win:(s>>10&1)===1};}

function drawScene(){
  ctx.clearRect(0,0,GW,GH);
  ctx.fillStyle=WORLDS[CW].bg;ctx.fillRect(0,0,GW,GH);

  // ── FAR CITY (parallax 0.15x) ──
  const farOff=(G.camX*.15)%100;
  const farStart=Math.floor(G.camX*.15/100)*100;
  for(let i=-1;i<14;i++){
    const bx=i*100-farOff;
    const b=getBld(farStart/100+i);
    ctx.fillStyle=CW===2?'#030015':CW===3?'#100000':CW===4?'#150300':'#010901';
    ctx.fillRect(bx,GROUND-b.h,b.w,b.h);
    // windows glow
    for(let wy=GROUND-b.h+12;wy<GROUND-20;wy+=20){
      for(let wc=bx+6;wc<bx+b.w-6;wc+=14){
        const ws=((bx+wc*3+wy*7)>>>0)%7;
        if(ws===0){ctx.fillStyle='rgba(0,255,65,.25)';ctx.shadowColor='#00ff41';ctx.shadowBlur=4;ctx.fillRect(wc,wy,8,10);ctx.shadowBlur=0;}
        else if(ws===1){ctx.fillStyle='rgba(0,150,40,.12)';ctx.fillRect(wc,wy,8,10);}
      }
    }
  }

  // ── MID CITY (parallax 0.45x) ──
  const midOff=(G.camX*.45)%140;
  const midStart=Math.floor(G.camX*.45/140)*140;
  for(let i=-1;i<10;i++){
    const bx=i*140-midOff;
    const b=getBld(midStart/140+i+500);
    const bh=b.h*.75|0;
    ctx.fillStyle='#010c01';
    ctx.fillRect(bx,GROUND-bh,b.w+20,bh);
    // rooftop antenna
    ctx.fillStyle='#023802';
    ctx.fillRect(bx+b.w/2+10,GROUND-bh-20,2,20);
    ctx.fillStyle='rgba(255,50,50,.6)';
    ctx.shadowColor='#ff3300';ctx.shadowBlur=8;
    ctx.fillRect(bx+b.w/2+9,GROUND-bh-22,4,4);
    ctx.shadowBlur=0;
  }

  // ── GROUND ──
  ctx.fillStyle=WORLDS[CW].gc;ctx.fillRect(0,GROUND,GW,GH-GROUND);
  // ground glow line
  ctx.shadowColor=WORLDS[CW].gl;ctx.shadowBlur=20;
  ctx.strokeStyle=WORLDS[CW].gl;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,GROUND);ctx.lineTo(GW,GROUND);ctx.stroke();
  ctx.shadowBlur=0;
  // ground grid lines
  ctx.strokeStyle=WORLDS[CW].gl.replace('ff','14');ctx.lineWidth=1;
  for(let gx=(-G.camX*.05)%60;gx<GW;gx+=60){ctx.beginPath();ctx.moveTo(gx,GROUND);ctx.lineTo(gx,GH);ctx.stroke();}

  // ── PLATFORMS ──
  G.platforms.forEach(pl=>{
    if(pl.x+pl.w<-20||pl.x>GW+20)return;
    // platform glow
    ctx.shadowColor=WORLDS[CW].gl;ctx.shadowBlur=14;
    ctx.fillStyle=WORLDS[CW].pc;ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
    ctx.shadowBlur=0;
    ctx.strokeStyle=WORLDS[CW].gl;ctx.lineWidth=1.5;ctx.strokeRect(pl.x,pl.y,pl.w,pl.h);
    // top light dots
    for(let px=pl.x+10;px<pl.x+pl.w-10;px+=24){
      ctx.fillStyle=WORLDS[CW].gl;ctx.shadowColor=WORLDS[CW].gl;ctx.shadowBlur=6;
      ctx.fillRect(px,pl.y,10,3);ctx.shadowBlur=0;
    }
  });

  // shake
  if(G.screenShake>0){
    ctx.save();ctx.translate((Math.random()-.5)*G.screenShake,(Math.random()-.5)*G.screenShake);
    G.screenShake*=.75;if(G.screenShake<.4)G.screenShake=0;
  }

  // ── PARTICLES ──
  G.particles.forEach(pt=>{
    ctx.save();const alpha=pt.life/pt.maxLife;ctx.globalAlpha=alpha;
    if(pt.type==='ring'){
      ctx.shadowColor=pt.col;ctx.shadowBlur=15;
      ctx.strokeStyle=pt.col;ctx.lineWidth=pt.width||2.5;
      ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.stroke();
    } else if(pt.type==='shard'){
      ctx.shadowColor=pt.col;ctx.shadowBlur=8;
      ctx.fillStyle=pt.col;ctx.fillRect(pt.x-pt.size/2,pt.y-pt.size/2,pt.size,pt.size);
    } else if(pt.type==='flash'){
      ctx.fillStyle='rgba(255,255,200,'+alpha+')';
      ctx.beginPath();ctx.arc(pt.x,pt.y,pt.maxR*(1-pt.life/pt.maxLife),0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });

  // ── FG BUILDINGS ──
  if(G.fgBlds){G.fgBlds.forEach(b=>{
    const bsx=b.wx-G.camX; // screen x
    if(bsx+b.w<-10||bsx>GW+10)return;
    ctx.fillStyle=CW===3?'#120000':CW===2?'#060020':CW===4?'#1a0600':'#010d01';
    ctx.fillRect(bsx,b.y,b.w,GROUND-b.y);
    ctx.shadowColor=WORLDS[CW].gl;ctx.shadowBlur=6;
    ctx.strokeStyle=WORLDS[CW].gl.replace('ff','18');ctx.lineWidth=1;ctx.strokeRect(bsx,b.y,b.w,GROUND-b.y);
    ctx.shadowBlur=0;
    for(let wy=b.y+8;wy<GROUND-14;wy+=20){for(let bwx=bsx+5;bwx<bsx+b.w-5;bwx+=14){if(((b.wx+bwx+wy)*7)%5===0){ctx.shadowColor=WORLDS[CW].gl;ctx.shadowBlur=4;ctx.fillStyle=WORLDS[CW].gl.replace('ff','28');ctx.fillRect(bwx,wy,9,11);ctx.shadowBlur=0;}}}
  });}

  // ── CIVILIANS ──
  ctx.globalAlpha=1;
  if(G.civilians){G.civilians.forEach(cv=>{
    if(!cv.sx||cv.sx<-60||cv.sx>GW+60)return;
    ctx.save();
    // transforming glow
    if(cv.transformTimer>0){
      const tpct=cv.transformTimer/40;
      ctx.globalAlpha=.5+tpct*.5;
      ctx.shadowColor='#00ff41';ctx.shadowBlur=10+tpct*20;
    }
    // shadow
    ctx.fillStyle='rgba(0,255,65,.05)';
    ctx.beginPath();ctx.ellipse(cv.sx+13,GROUND,10,4,0,0,Math.PI*2);ctx.fill();
    // sprite — use shirt color based on hair type
    const shirtCols=[null,'#aa3300','#4444aa'];
    const spr=cv.animFrame===0?CIV_WALK1:CIV_WALK2;
    drawSprite(ctx,spr,cv.sx,cv.y,cv.facing<0,shirtCols[cv.hair]||'#226622',null);
    // transform indicator
    if(cv.transformTimer>5){
      const pct=cv.transformTimer/90;
      ctx.fillStyle=`rgba(0,255,65,${pct*.6})`;
      ctx.fillRect(cv.sx,cv.y-10,27*pct,3);
    }
    ctx.restore();
  });}

  ctx.globalAlpha=1;
  // ── ENEMIES ──
  G.enemies.forEach(en=>{
    if(en.x<-80||en.x>GW+80)return;
    ctx.save();
    if(en.stealthA!==undefined&&en.stealthA<1)ctx.globalAlpha=en.stealthA;
    if(en.health/en.maxHealth<.3&&Math.random()>.55)ctx.translate((Math.random()-.5)*5,0);
    const isWalk=en.anim==='walk',isSh=en.isShooting;
    const spr=isSh?AG_SHOOT:(isWalk&&en.animFrame===1?AG_WALK:AG_IDLE);
    // shadow on ground
    ctx.fillStyle='rgba(0,255,65,.06)';
    ctx.beginPath();ctx.ellipse(en.x+en.w/2,GROUND,en.w*.6,6,0,0,Math.PI*2);ctx.fill();
    const glowC=en.agentCol||'#00ff41';
    if(G.p.codeVision){ctx.fillStyle='#ff2200';ctx.font='bold 11px Share Tech Mono';ctx.shadowColor='#ff0000';ctx.shadowBlur=6;ctx.fillText(Math.ceil(en.health)|0,en.x,en.y-6);ctx.shadowBlur=0;}
    drawSprite(ctx,spr,en.x,en.y,en.facing<0,en.tint,glowC);
    // HP bar
    const hp=en.health/en.maxHealth;
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(en.x,en.y-14,en.w,6);
    ctx.shadowColor=glowC;ctx.shadowBlur=6;
    ctx.fillStyle=hp>.5?glowC:hp>.25?'#ffaa00':'#ff3300';
    ctx.fillRect(en.x,en.y-14,en.w*hp,6);ctx.shadowBlur=0;
    // NAME TAG above agent
    const nameLabel=en.name||'AGENT SMITH';
    ctx.font='bold 10px Share Tech Mono';
    const nw=ctx.measureText(nameLabel).width;
    ctx.fillStyle='rgba(0,0,0,.75)';
    ctx.fillRect(en.x+en.w/2-nw/2-4,en.y-32,nw+8,14);
    ctx.shadowColor=glowC;ctx.shadowBlur=8;
    ctx.fillStyle=glowC;
    ctx.fillText(nameLabel,en.x+en.w/2-nw/2,en.y-21);
    ctx.shadowBlur=0;
    ctx.restore();
  });

  ctx.globalAlpha=1;ctx.shadowBlur=0;
  // ── ENEMY BULLETS ── real gun fire look
  G.bullets.forEach(b=>{
    ctx.save();
    ctx.globalAlpha=1;
    const col=b.col||'#ffcc00';
    const bt=G.p.isBulletTime;
    const speed=Math.sqrt(b.vx*b.vx+b.vy*b.vy)||1;
    const nx=b.vx/speed, ny=b.vy/speed;
    const trailLen=bt?28:14;

    // outer glow halo
    ctx.beginPath();
    ctx.arc(b.x,b.y,11,0,Math.PI*2);
    ctx.fillStyle=col.replace(')',' / 0.18)').replace('rgb','rgba').replace('#','rgba(').replace(/rgba\(([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/i,(_,r,g,bl)=>`rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(bl,16)}`);
    // simpler glow:
    ctx.globalAlpha=0.2;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(b.x,b.y,14,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // elongated bullet body (tracer round look)
    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.rotate(Math.atan2(b.vy,b.vx));
    // hot white core
    ctx.fillStyle='#ffffff';
    ctx.fillRect(-trailLen/2,-2,trailLen/2,4);
    // colored outer shell
    ctx.fillStyle=col;
    ctx.fillRect(-trailLen,-3,trailLen,6);
    // bright leading tip
    ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();
    ctx.restore();

    ctx.restore();
  });
  ctx.globalAlpha=1;

  // ── HEART PICKUPS ──
  if(G.hearts){G.hearts.forEach(h=>{
    const sx=h.wx-G.camX;
    if(sx<-30||sx>GW+30)return;
    const bob=Math.sin(h.anim*.08)*4;
    ctx.save();ctx.globalAlpha=.8+Math.sin(h.anim*.1)*.2;
    drawHeart(ctx,sx,h.y+bob-10,10,'#ff2255');
    ctx.restore();
  });}

  // ── PLAYER BULLETS ──
  if(G.pBullets){G.pBullets.forEach(b=>{ctx.save();const _gl=WORLDS[CW].gl;ctx.shadowColor=_gl;ctx.shadowBlur=12;ctx.fillStyle=_gl;ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=.3;ctx.strokeStyle=_gl;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-b.vx*6,b.y);ctx.stroke();ctx.shadowBlur=0;ctx.restore();});}

  // ── FINAL BOSS ──
  if(G.boss){
    const b=G.boss;
    const hp=b.health/b.maxHealth;
    const phase=b.phase||1;
    const col=phase===3?'#ff0000':phase===2?'#ff4400':'#ff8800';
    // boss pulse aura
    ctx.save();
    ctx.globalAlpha=.15+Math.sin(Date.now()*.006)*.1;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(b.x+b.w/2,b.y+b.h/2,b.w*.9+Math.sin(Date.now()*.008)*10,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // boss body — giant dark figure
    ctx.shadowColor=col;ctx.shadowBlur=30;
    ctx.fillStyle='#0a0000';ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.strokeStyle=col;ctx.lineWidth=3;ctx.strokeRect(b.x,b.y,b.w,b.h);
    // boss face
    ctx.fillStyle='#1a0000';ctx.fillRect(b.x+15,b.y+10,b.w-30,b.h*.35);
    // glowing red eyes
    ctx.fillStyle='#ff0000';ctx.shadowColor='#ff0000';ctx.shadowBlur=15;
    ctx.beginPath();ctx.arc(b.x+b.w*.3,b.y+b.h*.18,7,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(b.x+b.w*.7,b.y+b.h*.18,7,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // boss name
    ctx.font='bold 13px Share Tech Mono';
    const bnw=ctx.measureText(b.name).width;
    ctx.fillStyle='rgba(0,0,0,.85)';ctx.fillRect(b.x+b.w/2-bnw/2-6,b.y-36,bnw+12,18);
    ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=12;
    ctx.fillText(b.name,b.x+b.w/2-bnw/2,b.y-22);ctx.shadowBlur=0;
    // boss HP bar — full width at top
    const barW=GW-100;const barX=50;const barY=GH-45;
    ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(barX,barY,barW,14);
    ctx.fillStyle=hp>.5?'#ff8800':hp>.25?'#ff4400':'#ff0000';
    ctx.shadowColor=col;ctx.shadowBlur=8;
    ctx.fillRect(barX,barY,barW*hp,14);ctx.shadowBlur=0;
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.strokeRect(barX,barY,barW,14);
    ctx.fillStyle=col;ctx.font='bold 11px Share Tech Mono';
    ctx.fillText('THE SOURCE  PHASE '+phase+'/3  '+Math.ceil(b.health)+'/'+b.maxHealth,barX+8,barY+11);
    // hint at low hp
    const powerPct=Math.min(1,G.totalPowers/15);
    ctx.fillStyle=WORLDS[CW].gl.replace('ff','33');ctx.fillRect(barX,barY+16,barW,4);
    ctx.fillStyle='#ffdd00';ctx.fillRect(barX,barY+16,barW*powerPct,4);
    ctx.fillStyle='rgba(255,200,0,.7)';ctx.font='10px Share Tech Mono';
    ctx.fillText('POWER LEVEL: '+G.totalPowers+' (MORE POWERS = MORE DAMAGE)',barX+8,barY+28);
    ctx.restore();
  }

  // ── PLAYER ──
  const p=G.p;
  ctx.save();
  if(p.isInvisible)ctx.globalAlpha=.22;
  else if(p.invincible)ctx.globalAlpha=.55+Math.sin(Date.now()*.09)*.45;
  // shadow
  if(!p.isFlying&&!p.infiniteFly){
    ctx.fillStyle='rgba(0,255,65,.08)';
    ctx.beginPath();ctx.ellipse(p.x+p.w/2,GROUND,p.w*.55,7,0,0,Math.PI*2);ctx.fill();
  }
  // slide squash
  const isSlide=p.isSliding;
  if(isSlide){ctx.save();ctx.translate(p.x+p.w/2,p.y+p.h);ctx.scale(1,.5);ctx.translate(-(p.x+p.w/2),-(p.y+p.h));}
  // sprite
  const isNeo=G.char==='neo';
  let spr;
  if(p.gunAnim>0){p.gunAnim--;p.anim='punch';} // gun anim reuses punch pose
  if(p.anim==='punch')spr=isNeo?NEO_PUNCH:TRI_PUNCH;
  else if(p.anim==='fly')spr=isNeo?NEO_FLY:TRI_IDLE;
  else if(p.anim==='jump')spr=isNeo?NEO_JUMP:TRI_IDLE;
  else if(p.anim==='run')spr=isNeo?(p.animFrame===0?NEO_RUN1:NEO_RUN2):(p.animFrame===0?TRI_RUN1:TRI_IDLE);
  else spr=isNeo?NEO_IDLE:TRI_IDLE;
  const pGlow=p.isHacked?'#00ccff':p.isBulletTime?'rgba(0,255,65,.3)':null;
  drawSprite(ctx,spr,p.x,p.y,p.facing<0,null,pGlow);
  if(isSlide)ctx.restore();
  // player name tag
  const pName=G.char==='neo'?'NEO':'TRINITY';
  const pNameCol=G.char==='neo'?'#00ff41':'#cc44ff';
  ctx.globalAlpha=1;
  ctx.font='bold 11px Share Tech Mono';
  const pnw=ctx.measureText(pName).width;
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(p.x+p.w/2-pnw/2-5,p.y-26,pnw+10,15);
  ctx.shadowColor=pNameCol;ctx.shadowBlur=10;ctx.fillStyle=pNameCol;
  ctx.fillText(pName,p.x+p.w/2-pnw/2,p.y-14);ctx.shadowBlur=0;
  // fly trail
  if(p.isFlying||p.infiniteFly){
    for(let i=0;i<6;i++){
      ctx.globalAlpha=(6-i)*.06;ctx.fillStyle=i<3?'#00aaff':'#00ff41';
      ctx.shadowColor='#00aaff';ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(p.x+p.w/2,p.y+p.h+i*9,11-i*1.5,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }
  // special auras
  if(p.isHacked){
    ctx.globalAlpha=1;ctx.strokeStyle='rgba(0,200,255,.7)';ctx.lineWidth=3;
    ctx.shadowColor='#00ccff';ctx.shadowBlur=25;
    ctx.beginPath();ctx.arc(p.x+p.w/2,p.y+p.h/2,36,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
  }
  if(p.isBulletTime&&!p.isHacked){
    ctx.globalAlpha=.5+Math.sin(Date.now()*.015)*.5;
    ctx.strokeStyle='rgba(0,255,65,.4)';ctx.lineWidth=2;
    ctx.shadowColor='#00ff41';ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(p.x+p.w/2,p.y+p.h/2,28+Math.sin(Date.now()*.012)*4,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
  }
  if(p.invincible&&!p.isHacked){
    ctx.globalAlpha=.6;ctx.strokeStyle='rgba(255,220,0,.5)';ctx.lineWidth=2;
    ctx.shadowColor='#ffdd00';ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(p.x+p.w/2,p.y+p.h/2,32,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
  }
  ctx.restore();
  if(G.screenShake>0)ctx.restore();

  // ── HUD ──
  // ammo dots
  ctx.save();const _wgl=WORLDS[CW].gl;for(let ai=0;ai<p.maxAmmo;ai++){ctx.fillStyle=ai<p.ammo?_wgl:'#222';ctx.shadowColor=ai<p.ammo?_wgl:'transparent';ctx.shadowBlur=ai<p.ammo?4:0;ctx.fillRect(14+ai*8,GH-18,5,8);}ctx.shadowBlur=0;ctx.restore();
  // draw hearts on canvas
  ctx.save();
  const flashAlpha=p.heartFlash>0?(p.heartFlash%8<4?1:.3):1;
  if(p.heartFlash>0)p.heartFlash--;
  for(let hi=0;hi<p.maxHearts;hi++){
    const hx=14+hi*32,hy=38;
    const filled=hi<p.hearts;
    ctx.globalAlpha=filled?flashAlpha:.25;
    drawHeart(ctx,hx,hy,10,filled?(p.isHacked?'#00ccff':'#ff2255'):'#660033');
  }
  // extra hearts (beyond max) in gold
  ctx.globalAlpha=1;
  document.getElementById('hfill').style.width='0';
  document.getElementById('hfill').style.background='transparent';
  document.getElementById('hfill').style.boxShadow='none';
  document.getElementById('hbar_label').style.display='none';
  ctx.restore();
  document.getElementById('wnum').textContent='WAVE '+G.wave+'  KILLS:'+G.kills+'  '+Math.floor(G.camX/60)+'m';
  // combo flash on screen
  if(G.p.comboChain>2){
    ctx.save();ctx.globalAlpha=Math.min(1,(G.p.comboChain-2)*.2);
    ctx.font='bold '+(24+G.p.comboChain*2)+'px Share Tech Mono';
    const cc=G.p.comboChain>=10?'#ffdd00':G.p.comboChain>=5?'#ff8800':'#00ff41';
    ctx.fillStyle=cc;ctx.shadowColor=cc;ctx.shadowBlur=20;
    ctx.fillText(G.p.comboChain+' COMBO!',G.p.x+G.p.w/2-60,G.p.y-40);
    ctx.shadowBlur=0;ctx.restore();
  }
  document.getElementById('wnum').style.color=WORLDS[CW].gl;
}


// ── BEST RECORD ──────────────────────────────────────────────────
function loadRecord(){try{return JSON.parse(localStorage.getItem('matrixRecord')||'{"kills":0,"wave":1,"world":"CITY"}');}catch(e){return{kills:0,wave:1,world:'CITY'};}}
function saveRecord(kills,wave,world){
  const r=loadRecord();
  if(kills>r.kills){localStorage.setItem('matrixRecord',JSON.stringify({kills,wave,world}));return true;}
  return false;
}
function showRecord(){
  const r=loadRecord();
  const rtxt='BEST: '+r.kills+' KILLS · WAVE '+r.wave+' · '+r.world;
  document.getElementById('bestRecord').textContent=rtxt;
  const gr=document.getElementById('goRecord');if(gr)gr.textContent=rtxt;
}
// ── GAME LOOP ─────────────────────────────────────────────────────
function loop(){
  if(!G||!G.running){requestAnimationFrame(loop);return;}
  drawRain();
  if(G.p.hearts<=0){
    G.running=false;
    const go=document.getElementById('goScreen');go.style.display='flex';
    const isNewRecord=saveRecord(G.kills,G.wave,WORLDS[CW].n);
    document.getElementById('goStats').innerHTML=(isNewRecord?'<span style="color:#ffdd00;text-shadow:0 0 10px #ffdd00">★ NEW RECORD ★</span><br>':'')+`WAVE: ${G.wave}<br>KILLS: ${G.kills}<br>WORLD: ${WORLDS[CW].n}<br>DISTANCE: ${Math.floor(G.camX/60)}m`;
    showRecord();
    return;
  }
  updatePlayer();updateEnemies();updateBullets();updatePunchHit();updateParticles();updateHearts();updateCivilians();if(G.bossActive||G.boss)updateBoss();checkWave();drawScene();
  requestAnimationFrame(loop);
}

// ── START SCREEN RAIN ─────────────────────────────────────────────
function startRainLoop(){
  drawStartRain();
  if(document.getElementById('startScreen').style.display!=='none')requestAnimationFrame(startRainLoop);
}
startRainLoop();
showRecord();
requestAnimationFrame(loop);
</script>
